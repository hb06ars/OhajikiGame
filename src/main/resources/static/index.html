<!doctype html>
<html lang="pt-BR">
<head>
    <meta charset="utf-8">
    <title>Ohajiki Online</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="icon" href="img/icone.png">
    <link rel="manifest" href="/manifest.json">
    <link rel="shortcut icon" href="img/icone.png">
    <meta name="theme-color" content="#000000">
</head>

<body>

<!-- ==================== LOBBY ==================== -->
<div id="telaLobby">

    <h1>🎯 Ohajiki Online</h1>

    <div class="painelLobby">

        <button class="bt-verde" id="btcriar" onclick="criarSala()">
            Criar Sala
        </button>

        <button class="bt-azul" id="btvoltar" onclick="voltar()" style="display:none">
            Voltar
        </button>

        <input
                id="codigoSala"
                type="text"
                maxlength="5"
                placeholder="Buscar código da sala existente.">

        <button class="bt-azul" id="btEntrarSala" onclick="entrarSala()">
            Entrar
        </button>

        <button class="bt-vermelho" onclick="window.location.href='offline/indexoffline.html'">
            Jogar Offline
        </button>

        <br><br>

        <div id="statusSala">
            Clique em "Criar Sala" ou informe um código.
        </div>

        <hr>
        <div id="listaSalas"></div>

    </div>

</div>

<!-- ==================== JOGO ==================== -->

<div id="telaJogo" style="display:none;">

    <div id="placar">
            <span>🔵
                <span id="pontosAzul">0</span>
            </span>

        <span>
                🔴
                <span id="pontosVermelho">0</span>
            </span>
    </div>

    <div id="vez">
            <div id="infoJogador">
                Você é: -
            </div>
    </div>

    <canvas id="c"></canvas>

</div>

<script src="js/partida.js"></script>
<script src="js/game.js"></script>
<script src="js/socket.js"></script>

<script>
    function voltar(){
        window.location.href='/';
    }
</script>

</body>
</html>
